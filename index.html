<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEDAMORFEY | Система</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100vh;
      overflow: hidden;
      background: #000;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      cursor: none;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }
    h1 {
      font-size: 5.8rem;
      letter-spacing: 15px;
      text-transform: uppercase;
      margin: 0 0 20px 0;
      text-shadow: 0 0 20px #00ff41,
                   0 0 40px #00ff41;
      pointer-events: all;
      cursor: none;
      user-select: none;
    }
    h1:hover {
      animation: glitch 0.3s linear infinite;
      text-shadow: 0 0 40px #00ff41,
                   0 0 80px #ff00ff;
    }
    @keyframes glitch {
      0%   { transform: translate(0); }
      20%  { transform: translate(-3px, 3px); }
      40%  { transform: translate(-3px, -3px); }
      60%  { transform: translate(3px, 3px); }
      80%  { transform: translate(3px, -3px); }
      100% { transform: translate(0); }
    }
    .pill {
      margin-top: 50px;
      padding: 18px 60px;
      font-size: 1.5rem;
      background: transparent;
      color: #00ff41;
      border: 3px solid #00ff41;
      text-transform: uppercase;
      letter-spacing: 8px;
      cursor: pointer;
      pointer-events: all;
      transition: all 0.4s ease;
      box-shadow: 0 0 25px #00ff41;
    }
    .pill:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 50px #00ff41,
                  0 0 70px #ff00ff;
      transform: scale(1.12);
    }
    .subtitle {
      margin-top: 30px;
      font-size: 1.2rem;
      opacity: 0.75;
      letter-spacing: 6px;
    }

    /* Кастомный курсор */
    .cursor {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 1px solid #00ff41;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 0 15px #00ff41;
      mix-blend-mode: difference;
      transition: transform 0.1s;
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <div class="content">
    <h1>DEDAMORFEY</h1>
    <div class="subtitle">СИСТЕМА АКТИВИРОВАНА</div>
    <button class="pill" onclick="takePill()">ПРИНЯТЬ КРАСНУЮ ТАБЛЕТКУ</button>
  </div>

  <div class="cursor" id="customCursor"></div>

  <script>
    // === MATRIX RAIN ===
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 14;
    const columns = Math.floor(w / fontSize);
    const drops = new Array(columns).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#00ff41';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > h && Math.random() > 0.975)
          drops[i] = 0;

        drops[i]++;
      }
    }

    setInterval(drawMatrix, 35);

    // === ИНТЕРАКТИВНЫЙ ДОЖДЬ (реакция на мышь) ===
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Лёгкий "всплеск" при движении мыши
      const col = Math.floor(mouseX / fontSize);
      if (drops[col]) drops[col] = Math.max(0, drops[col] - 8);
    });

    // Взрыв при клике
    document.addEventListener('click', (e) => {
      const col = Math.floor(e.clientX / fontSize);
      for (let i = -5; i < 6; i++) {
        if (drops[col + i] !== undefined) {
          drops[col + i] = Math.max(0, drops[col + i] - 25);
        }
      }
    });

    // === КАСТОМНЫЙ КУРСОР ===
    const cursor = document.getElementById('customCursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // === КНОПКА ТАБЛЕТКИ ===
    function takePill() {
      const pill = document.querySelector('.pill');
      pill.style.transition = 'all 0.6s';
      pill.style.transform = 'scale(0.8)';
      pill.style.opacity = '0';

      // Финальный взрыв кода
      for (let i = 0; i < drops.length; i++) {
        drops[i] = Math.max(0, drops[i] - 40);
      }

      setTimeout(() => {
        alert("Добро пожаловать в реальность, Нео.\n\nТы только что вышел из Матрицы.");
        // Здесь потом можно сделать реальный переход на dashboard.html
        window.location.href = "dashboard.html";
      }, 800);
    }

    // Адаптация под размер окна
    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
