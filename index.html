<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДЕДУШКА МОРФИУС • ПРИМИ КРАСНУЮ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      margin: 0; padding: 0; overflow: hidden; background: #000; color: #0f0;
      font-family: 'VT323', monospace; height: 100vh; display: flex;
      align-items: center; justify-content: center; position: relative;
    }

    canvas { position: absolute; top: 0; left: 0; z-index: 1; }

    .container {
      position: relative; z-index: 10; text-align: center; padding: 40px; max-width: 860px;
    }

    h1 {
      font-size: 5.2rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 30px #0f0, 0 0 60px #0f0;
      animation: glitch 1.8s infinite;
      letter-spacing: 6px;
    }

    .subtitle {
      font-size: 2.6rem;
      color: #ff3333;
      margin-bottom: 50px;
      text-shadow: 0 0 25px #ff0000;
    }

    .pill {
      width: 220px; height: 220px; margin: 40px auto 50px;
      background: radial-gradient(circle at 40% 30%, #ff2222, #aa0000);
      border-radius: 50%;
      box-shadow: 0 0 100px #ff0000, 0 0 200px #ff0000, inset 0 0 70px rgba(255,255,255,0.7);
      cursor: pointer; transition: all 0.6s ease; position: relative;
      animation: pulse-red 2.5s infinite;
    }

    .pill:hover {
      transform: scale(1.28) rotate(10deg);
      box-shadow: 0 0 160px #ff0000, 0 0 320px #ff0000;
    }

    .pill::after {
      content: "КРАСНАЯ ТАБЛЕТКА";
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 1.6rem; color: #000; font-weight: bold; text-shadow: none;
    }

    .text {
      font-size: 1.9rem;
      line-height: 1.6;
      max-width: 780px;
      margin: 0 auto 50px;
      color: #0f0;
    }

    .tg-button {
      display: inline-block;
      padding: 20px 60px;
      font-size: 2.1rem;
      background: #00cc00;
      color: #000;
      border: 5px solid #0f0;
      text-decoration: none;
      box-shadow: 0 0 50px #0f0;
      transition: all 0.4s;
      font-weight: bold;
    }

    .tg-button:hover {
      background: #00ff00;
      transform: scale(1.08);
      box-shadow: 0 0 80px #0f0;
    }

    @keyframes glitch {
      0%,100% { text-shadow: 5px 0 #0f0, -5px 0 #ff0000; }
      50% { text-shadow: -5px 0 #0f0, 5px 0 #ff0000; }
    }

    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 100px #ff0000, 0 0 200px #ff0000; }
      50% { box-shadow: 0 0 160px #ff0000, 0 0 320px #ff0000; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <h1>ДЕДУШКА МОРФИУС</h1>
    <p class="subtitle">ПРОСНИСЬ, СЫНОК</p>
    
    <div class="pill" id="redpill"></div>
    
    <p class="text">
      Устал пахать на систему?<br>
      Хочешь нормальную работу без обмана?<br><br>
      Я — Дедушка Морфиус.<br>
      Прими красную таблетку — и я устрою тебя на работу.<br>
      <strong>Казахстан • Россия</strong>
    </p>

    <a href="https://t.me/PLAZmaMatr1x" class="tg-button">
      → ПИСАТЬ ДЕДУШКЕ В TELEGRAM ←
    </a>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const chars = "01ネオモーフィウスデドゥシュカПЛАЗМАMATRIXКРАСНАЯТАБЛЕТКАЗИОН".split('');
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f0';
      ctx.font = `${fontSize}px VT323`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 33);

    document.getElementById('redpill').addEventListener('click', () => {
      window.location.href = 'https://t.me/PLAZmaMatr1x';
    });

    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    });
  </script>
</body>
</html>
