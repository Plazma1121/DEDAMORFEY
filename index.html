<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЕДУШКА МОРФИУС • ВЫБОР ТАБЛЕТКИ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'VT323', monospace;
            color: #0f0;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.85;
        }

        .morpheus-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/5z3kL8P.jpg') center/cover no-repeat; /* Морфиус */
            z-index: 2;
            opacity: 0.45;
            mix-blend-mode: screen;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 5.5rem;
            text-shadow: 0 0 30px #0f0;
            margin: 0 0 10px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 2.4rem;
            color: #0a0;
            margin-bottom: 70px;
            text-shadow: 0 0 15px #0f0;
        }

        .pill-container {
            display: flex;
            flex-direction: column;
            gap: 50px;
            z-index: 20;
        }

        .pill-button {
            padding: 30px 100px;
            font-size: 29px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 60px rgba(0,0,0,0.95);
            letter-spacing: 5px;
            min-width: 560px;
            position: relative;
            z-index: 30;
        }

        .red-pill {
            background: linear-gradient(#c00, #800);
            color: #fff;
            box-shadow: 0 0 60px #f00;
        }

        .red-pill:hover {
            transform: scale(1.1);
            box-shadow: 0 0 80px #f00;
        }

        .blue-pill {
            background: linear-gradient(#0088ff, #0044aa);
            color: #fff;
            box-shadow: 0 0 60px #00aaff;
        }

        .blue-pill:hover {
            transform: scale(1.1);
            box-shadow: 0 0 80px #00ccff;
        }

        .pill-text {
            text-shadow: 0 0 20px rgba(255,255,255,0.9);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 1.4rem;
            color: #040;
            z-index: 20;
        }
    </style>
</head>
<body>

    <!-- Водопад из кода Матрицы -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Фон с Морфиусом -->
    <div class="morpheus-bg"></div>

    <div class="content">
        <h1>ДЕДУШКА МОРФИУС</h1>
        <p class="subtitle">Выбери свою судьбу</p>

        <div class="pill-container">
            <button onclick="takeRedPill()" class="pill-button red-pill">
                <span class="pill-text">ПРИМИ КРАСНУЮ ТАБЛЕТКУ</span>
            </button>

            <button onclick="takeBluePill()" class="pill-button blue-pill">
                <span class="pill-text">ЕСЛИ У ТЕБЯ ЕСТЬ АВТОМОБИЛЬ — ПРИМИ СИНЮЮ</span>
            </button>
        </div>
    </div>

    <div class="footer">Следуй за белым кроликом...</div>

    <script>
        // === НАСТОЯЩИЙ MATRIX RAIN ===
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });

        // === Функции таблеток ===
        function takeRedPill() {
            window.location.href = "https://t.me/PLAZmaMatr1x";
        }

        function takeBluePill() {
            if (confirm("Ты уверен, Нео?\n\nСиняя таблетка оставит тебя в Матрице...\nНо хотя бы с автомобилем.\n\nПерейти к Дедушке?")) {
                window.location.href = "https://t.me/PLAZmaMatr1x";
            }
        }
    </script>
</body>
</html>
