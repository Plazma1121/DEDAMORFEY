<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЕДУШКА МОРФИУС • ВЫБОР ТАБЛЕТКИ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .matrix-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 0, 0.03));
            pointer-events: none;
            z-index: 1;
            animation: matrix 20s linear infinite;
        }

        @keyframes matrix {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        h1 {
            font-size: 4.5rem;
            text-shadow: 0 0 20px #0f0;
            margin: 20px 0;
            z-index: 2;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 2rem;
            color: #0a0;
            margin-bottom: 60px;
            z-index: 2;
        }

        .pill-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 2;
        }

        .pill-button {
            padding: 25px 80px;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            letter-spacing: 4px;
            min-width: 420px;
        }

        .red-pill {
            background: linear-gradient(#c00, #800);
            color: #fff;
            box-shadow: 0 0 50px #f00;
        }

        .red-pill:hover {
            background: linear-gradient(#f00, #c00);
            box-shadow: 0 0 70px #f00;
            transform: scale(1.1);
        }

        .blue-pill {
            background: linear-gradient(#0088ff, #0044aa);
            color: #fff;
            box-shadow: 0 0 50px #00aaff;
        }

        .blue-pill:hover {
            background: linear-gradient(#00ccff, #0088ff);
            box-shadow: 0 0 70px #00ccff;
            transform: scale(1.1);
        }

        .pill-text {
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            color: #040;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="matrix-bg"></div>

    <h1>ДЕДУШКА МОРФИУС</h1>
    <p class="subtitle">Выбери свою судьбу</p>

    <div class="pill-container">
        
        <!-- Красная таблетка -->
        <button onclick="takeRedPill()" class="pill-button red-pill">
            <span class="pill-text">ПРИМИ КРАСНУЮ ТАБЛЕТКУ</span>
        </button>

        <!-- Синяя таблетка (новая) -->
        <button onclick="takeBluePill()" class="pill-button blue-pill">
            <span class="pill-text">ЕСЛИ У ТЕБЯ ЕСТЬ АВТОМОБИЛЬ — ПРИМИ СИНЮЮ</span>
        </button>

    </div>

    <div class="footer">Следуй за белым кроликом...</div>

    <script>
        function takeRedPill() {
            document.body.style.transition = "all 3s";
            document.body.innerHTML = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#0f0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:42px;text-align:center;padding:40px;z-index:999;">
                    <h1>ТЫ ВЫБРАЛ ПРАВДУ</h1>
                    <p style="font-size:28px;margin:40px 0;">Добро пожаловать в реальный мир, Нео...</p>
                    <p style="font-size:22px;color:#080;">Матрица больше не держит тебя.</p>
                </div>
            `;
        }

        function takeBluePill() {
            document.body.style.transition = "all 2.5s";
            document.body.innerHTML = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#001133;color:#88ccff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:38px;text-align:center;padding:40px;z-index:999;">
                    <h1>ТЫ ПРИНЯЛ СИНЮЮ ТАБЛЕТКУ</h1>
                    <p style="font-size:26px;margin:30px 0;">Автомобиль ждёт тебя в симуляции.<br>Комфорт. Тишина. Иллюзия.</p>
                    <p style="font-size:24px;color:#4488ff;">Возвращайся в Матрицу, Нео.<br>Она уже скучает по тебе.</p>
                </div>
            `;
        }

        // Лёгкий эффект зелёного дождя (по желанию можно усилить)
        console.log("%cСледуй за белым кроликом...", "color:#0f0; font-size:16px;");
    </script>
</body>
</html>
