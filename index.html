<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DEDAMORFEY | Система</title>
<style>
    body, html { margin:0; padding:0; overflow:hidden; background:#000; font-family:'Courier New', monospace; color:#0f0; }
    #deda { position:fixed; top:0; left:0; right:0; bottom:0; background:linear-gradient(#111,#000); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:10; transition:opacity 1.8s; }
    h1 { font-size:6rem; letter-spacing:12px; margin:0; text-shadow:0 0 30px #0f0; }
    .status { font-size:1.6rem; margin:20px 0; color:#0f0; text-shadow:0 0 10px #0f0; }
    button { margin-top:40px; padding:18px 50px; font-size:1.8rem; background:transparent; color:#f00; border:3px solid #f00; cursor:pointer; transition:all 0.4s; text-transform:uppercase; }
    button:hover { background:#f00; color:#000; box-shadow:0 0 40px #f00; }
    
    canvas { position:fixed; top:0; left:0; z-index:5; }
    
    #terminal { position:fixed; top:0; left:0; right:0; bottom:0; background:#000; display:none; flex-direction:column; z-index:20; }
    #output { flex:1; padding:40px; overflow-y:auto; font-size:1.35rem; line-height:1.7; }
    #input-line { padding:20px 40px; font-size:1.5rem; display:flex; align-items:center; }
    #cursor { animation:blink 0.8s infinite; }
    @keyframes blink { 50% {opacity:0;} }
</style>
</head>
<body>

<!-- Твоя страница DEDAMORFEY -->
<div id="deda">
    <h1>DEDAMORFEY</h1>
    <div class="status">СИСТЕМА АКТИВИРОВАНА • УРОВЕНЬ 99%</div>
    <button onclick="takeRedPill()">ПРИНЯТЬ КРАСНУЮ ТАБЛЕТКУ</button>
</div>

<canvas id="canvas"></canvas>

<!-- Терминал Оракула -->
<div id="terminal">
    <div id="output"></div>
    <div id="input-line">
        <span style="color:#0f0">&gt;</span>
        <input type="text" id="userInput" autocomplete="off" style="background:none;border:none;color:#0f0;font-family:inherit;font-size:inherit;flex:1;outline:none;">
        <span id="cursor" style="color:#0f0">█</span>
    </div>
</div>

<script>
// Matrix Rain
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = '01ネオモーフィウスDEDAMORFEYАБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    for(let i=0; i<drops.length; i++){
        const text = chars[Math.floor(Math.random()*chars.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(draw, 35);

// Принять красную таблетку
function takeRedPill() {
    document.getElementById('deda').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('deda').style.display = 'none';
        document.getElementById('terminal').style.display = 'flex';
        
        addLine("Красная таблетка принята.", 600);
        setTimeout(() => addLine("Добро пожаловать в реальность, Нео.", 1400), 800);
        setTimeout(() => addLine("Теперь ты внутри. Задавай вопросы.", 1200), 2200);
    }, 1800);
}

function addLine(text, delay=0) {
    setTimeout(() => {
        const out = document.getElementById('output');
        const line = document.createElement('div');
        line.innerHTML = text;
        out.appendChild(line);
        out.scrollTop = out.scrollHeight;
        
        // Голос Морфиуса
        if('speechSynthesis' in window){
            const speak = new SpeechSynthesisUtterance(text);
            speak.lang = 'ru-RU';
            speak.pitch = 0.85;
            speak.rate = 0.92;
            speechSynthesis.speak(speak);
        }
    }, delay);
}

// Ввод
const input = document.getElementById('userInput');
input.addEventListener('keypress', e => {
    if(e.key === 'Enter' && input.value.trim()){
        const q = input.value.trim();
        addLine(`&gt; ${q}`);
        setTimeout(() => {
            const replies = [
                "Следуй за белым кроликом...",
                "Матрица повсюду, Нео.",
                "Выбор уже сделан. Теперь ты должен жить с ним.",
                "Я могу показать тебе дверь. Ты должен пройти через неё сам.",
                "Ты — Избранный. Или ещё нет?"
            ];
            addLine(replies[Math.floor(Math.random()*replies.length)]);
        }, 700);
        input.value = '';
    }
});

window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
