<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЕДУШКА МОРФИУС</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #000; color: #0f0;
            font-family: 'VT323', monospace;
        }

        #matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.92;
        }

        .content {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        h1 {
            font-size: 6.2rem; margin: 0 0 20px; 
            text-shadow: 0 0 40px #0f0, 0 0 80px #0f0;
            color: #0f0; letter-spacing: 14px;
        }

        .subtitle {
            font-size: 2.8rem; color: #0a0; margin-bottom: 40px; 
            text-shadow: 0 0 25px #0f0;
        }

        .lazung {
            font-size: 2.1rem; line-height: 1.4; margin: 20px 0; max-width: 940px;
            text-shadow: 0 0 20px #0f0;
        }

        .pill-container {
            display: flex; flex-direction: column; gap: 50px; margin: 60px 0; z-index: 20;
        }

        .pill-button {
            padding: 36px 130px; font-size: 35px; font-weight: bold;
            text-transform: uppercase; border: none; border-radius: 50px;
            cursor: pointer; transition: all 0.4s ease; 
            box-shadow: 0 0 80px rgba(0,0,0,0.95);
            letter-spacing: 7px; min-width: 720px;
        }

        .red-pill {
            background: linear-gradient(#c00, #800); color: #fff;
            box-shadow: 0 0 90px #f00;
        }
        .red-pill:hover { transform: scale(1.08); box-shadow: 0 0 110px #f00; }

        .blue-pill {
            background: linear-gradient(#0088ff, #0044aa); color: #fff;
            box-shadow: 0 0 90px #00aaff;
        }
        .blue-pill:hover { transform: scale(1.08); box-shadow: 0 0 110px #00ccff; }

        .telegram-btn {
            margin-top: 80px; padding: 24px 100px; font-size: 30px;
            background: #00ff00; color: #000; border: none; border-radius: 12px;
            cursor: pointer; font-weight: bold; box-shadow: 0 0 60px #0f0;
            text-transform: uppercase; letter-spacing: 6px;
        }
        .telegram-btn:hover {
            background: #00dd00; transform: scale(1.07); box-shadow: 0 0 80px #0f0;
        }
    </style>
</head>
<body>

    <!-- Чистый водопад из кода Матрицы -->
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1>ДЕДУШКА МОРФИУС</h1>
        <p class="subtitle">Выбери свою судьбу</p>

        <div class="lazung">Устал от серой Матрицы?</div>
        <div class="lazung">Хочешь настоящую работу, деньги и свободу?</div>
        <div class="lazung" style="color:#ff0; font-size:2.3rem;">Прими красную таблетку — я устрою тебя на хорошую работу.</div>
        <div class="lazung">Казахстан • Россия • Реальные вакансии с автомобилем</div>

        <div class="pill-container">
            <button onclick="takeRedPill()" class="pill-button red-pill">
                ПРИМИ КРАСНУЮ ТАБЛЕТКУ
            </button>

            <button onclick="takeBluePill()" class="pill-button blue-pill">
                ЕСЛИ У ТЕБЯ ЕСТЬ АВТОМОБИЛЬ — ПРИМИ СИНЮЮ
            </button>
        </div>

        <button onclick="goTelegram()" class="telegram-btn">
            → ПИСАТЬ ДЕДУШКЕ В TELEGRAM ←
        </button>
    </div>

    <script>
        // Настоящий водопад из кода Матрицы
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
            columns = canvas.width / fontSize;
            drops = Array(Math.floor(columns)).fill(1);
        });

        // Функции
        function takeRedPill() {
            window.location.href = "https://t.me/PLAZmaMatr1x";
        }

        function takeBluePill() {
            if (confirm("Синяя таблетка оставит тебя в комфортной Матрице...\nНо хотя бы с автомобилем.\n\nВсё равно хочешь писать Дедушке?")) {
                window.location.href = "https://t.me/PLAZmaMatr1x";
            }
        }

        function goTelegram() {
            window.location.href = "https://t.me/PLAZmaMatr1x";
        }
    </script>
</body>
</html>
