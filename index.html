<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДЕДУШКА МОРФИУС • ПРИМИ КРАСНУЮ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      margin: 0; padding: 0; overflow: hidden; background: #000; color: #0f0;
      font-family: 'VT323', monospace; height: 100vh; display: flex;
      align-items: center; justify-content: center; position: relative;
    }

    canvas { position: absolute; top: 0; left: 0; z-index: 1; }

    .container {
      position: relative; z-index: 10; text-align: center; padding: 40px; max-width: 900px;
    }

    h1 {
      font-size: 5.8rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 40px #0f0, 0 0 80px #0f0, 0 0 120px #0f0;
      animation: glitch 1.5s infinite;
      letter-spacing: 8px;
    }

    .subtitle {
      font-size: 2.8rem;
      color: #ff2222;
      margin-bottom: 60px;
      text-shadow: 0 0 30px #ff0000;
      animation: subtitle-glow 3s infinite alternate;
    }

    .pill {
      width: 240px; height: 240px; margin: 40px auto 60px;
      background: radial-gradient(circle at 40% 30%, #ff1a1a, #880000);
      border-radius: 50%;
      box-shadow: 
        0 0 120px #ff0000,
        0 0 240px #ff0000,
        inset 0 0 80px rgba(255,255,255,0.8);
      cursor: pointer; 
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      animation: pill-pulse 2.2s infinite;
      z-index: 10;
    }

    .pill:hover {
      transform: scale(1.35) rotate(15deg);
      box-shadow: 
        0 0 180px #ff0000,
        0 0 360px #ff0000,
        inset 0 0 100px rgba(255,255,255,0.9);
    }

    .pill::after {
      content: "КРАСНАЯ ТАБЛЕТКА";
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 1.7rem; color: #000; font-weight: bold;
      text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
    }

    .text {
      font-size: 2rem;
      line-height: 1.65;
      max-width: 820px;
      margin: 0 auto 60px;
      text-shadow: 0 0 15px #0f0;
    }

    .tg-button {
      display: inline-block;
      padding: 22px 70px;
      font-size: 2.3rem;
      background: linear-gradient(45deg, #00cc00, #00ff44);
      color: #000;
      border: 6px solid #0f0;
      text-decoration: none;
      box-shadow: 0 0 60px #0f0, 0 0 120px #0f0;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      font-weight: bold;
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    .tg-button:hover {
      transform: scale(1.12) translateY(-8px);
      box-shadow: 0 0 100px #0f0, 0 0 200px #0f0;
      background: linear-gradient(45deg, #00ff00, #44ff88);
    }

    .tg-button::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 40%; height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-25deg);
      animation: shine 4s infinite;
    }

    @keyframes glitch {
      0%,100% { text-shadow: 6px 0 #0f0, -6px 0 #ff0000; }
      50% { text-shadow: -6px 0 #0f0, 6px 0 #ff0000; }
    }

    @keyframes subtitle-glow {
      from { text-shadow: 0 0 20px #ff0000; }
      to { text-shadow: 0 0 50px #ff0000, 0 0 80px #ff0000; }
    }

    @keyframes pill-pulse {
      0%,100% { box-shadow: 0 0 120px #ff0000, 0 0 240px #ff0000; }
      50% { box-shadow: 0 0 200px #ff0000, 0 0 400px #ff0000; }
    }

    @keyframes shine {
      0% { transform: translateX(-150%) skewX(-25deg); }
      20% { transform: translateX(300%) skewX(-25deg); }
      100% { transform: translateX(300%) skewX(-25deg); }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <h1>ДЕДУШКА МОРФИУС</h1>
    <p class="subtitle">ПРОСНИСЬ, СЫНОК</p>
    
    <div class="pill" id="redpill"></div>
    
    <p class="text">
      Устал от серой Матрицы?<br>
      Хочешь настоящую работу и свободу?<br><br>
      Прими красную таблетку.<br>
      Я устрою тебя ко мне.<br>
      <strong>Казахстан • Россия</strong>
    </p>

    <a href="https://t.me/PLAZmaMatr1x" class="tg-button">
      → ПИСАТЬ ДЕДУШКЕ В TELEGRAM ←
    </a>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const chars = "01ネオモーフィウスデドゥシュカПЛАЗМАMATRIXКРАСНАЯТАБЛЕТКАЗИОН".split('');
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.065)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f0';
      ctx.font = `${fontSize}px VT323`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 33);

    // Улучшенный клик по таблетке
    document.getElementById('redpill').addEventListener('click', () => {
      const pill = document.getElementById('redpill');
      pill.style.transition = 'all 0.8s';
      pill.style.transform = 'scale(0.7) rotate(360deg)';
      
      setTimeout(() => {
        window.location.href = 'https://t.me/PLAZmaMatr1x';
      }, 600);
    });

    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    });
  </script>
</body>
</html>
